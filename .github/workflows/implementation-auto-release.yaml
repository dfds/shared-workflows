name: Auto release on merge (Implementation)

on:
  push:
    branches:
      - master
    paths-ignore:
      - ".gitignore"
      - "**/*.md"
      - "docs/**"
      - "renovate.json"

jobs:
  auto-release:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: ./.github/workflows/automation-enforce-release-labels.yml
